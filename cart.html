<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warenkorb - RedByte Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="cart-page">
  <main class="cart-main">
    <header class="product-top">
      <a class="back-link" href="index.html">Zuruck zur Startseite</a>
      <p>Artikel im Warenkorb: <strong class="cart-count-value">0</strong></p>
    </header>

    <section class="panel">
      <h1>Dein Warenkorb</h1>
      <div class="cart-items-wrap"></div>
    </section>

    <section class="panel checkout-panel">
      <h2>Kasse</h2>
      <p>Gesamt: <strong class="cart-total-value">0,00 EUR</strong></p>
      <form class="login-form checkout-form">
        <label for="fullName">Vollstandiger Name</label>
        <input id="fullName" name="fullName" required type="text" placeholder="Max Mustermann">

        <label for="address">Adresse</label>
        <input id="address" name="address" required type="text" placeholder="Musterstrasse 1, Berlin">

        <label for="email">E-Mail</label>
        <input id="email" name="email" required type="email" placeholder="name@example.com">

        <button type="submit">Jetzt kaufen</button>
      </form>
    </section>
  </main>
</body>
</html>
