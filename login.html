<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedByte Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-main">
    <section class="auth-panel">
      <div class="brand auth-brand">
        <span class="logo-mark" aria-hidden="true"></span>
        <div class="logo-text">
          <strong>RedByte Login</strong>
          <small>Login-Bereich</small>
        </div>
      </div>

      <h1>Einloggen</h1>
      <form action="#" method="post" class="login-form">
        <label for="username">Benutzername</label>
        <input id="username" type="text" placeholder="dein_name">
        <label for="password">Passwort</label>
        <input id="password" type="password" placeholder="********">
        <button type="submit">Einloggen</button>
      </form>
      <p class="hint">Hinweis: Dies ist ein Schulprojekt ohne echte Anmeldung.</p>

      <a class="back-link" href="index.html">Zuruck zum Shop</a>
    </section>
  </main>
</body>
</html>
