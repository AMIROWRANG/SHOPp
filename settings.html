<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen - RedByte Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="settings-page">
  <div class="premium-bg-orb orb-red"></div>
  <div class="premium-bg-orb orb-blue"></div>

  <main class="settings-wrap">
    <header class="settings-top panel">
      <div>
        <h1>Einstellungen</h1>
        <p class="muted">Verwalte dein Konto, die Darstellung, den Datenschutz und deine Einkaufs-Einstellungen.</p>
      </div>
      <a class="back-link" href="index.html">Zurück zur Startseite</a>
    </header>

    <form class="settings-grid">
      <section class="settings-card panel">
        <h2>◍ Kontoeinstellungen</h2>
        <div class="settings-fields">
          <label>Benutzername<input type="text" value="Ali Owrang"></label>
          <label>E-Mail<input type="email" value="amirowrang81@gmail.com"></label>
          <label>Neues Passwort<input type="password" placeholder="********"></label>
        </div>
      </section>

      <section class="settings-card panel">
        <h2>◐ Darstellung</h2>
        <div class="settings-fields">
          <label>Design
            <select>
              <option>Dunkelmodus</option>
              <option>Hellmodus</option>
            </select>
          </label>
          <label>Akzentfarbe
            <select>
              <option>Rot</option>
              <option>Blau</option>
              <option>Lila</option>
            </select>
          </label>
          <label>Schriftgröße
            <select>
              <option>Standard</option>
              <option>Kompakt</option>
              <option>Groß</option>
            </select>
          </label>
        </div>
      </section>

      <section class="settings-card panel">
        <h2>🌐 Sprache & Region</h2>
        <div class="settings-fields">
          <label>Sprache
            <select>
              <option>Deutsch</option>
              <option>English</option>
            </select>
          </label>
          <label>Währung
            <select>
              <option>EUR (€)</option>
              <option>USD ($)</option>
            </select>
          </label>
        </div>
      </section>

      <div class="settings-save">
        <button type="submit" class="button glow-red">Änderungen speichern</button>
      </div>
    </form>
  </main>
</body>
</html>
